<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Centro Analítico Inmersivo</title>
  <meta name="description" content="Recorrido VR por un centro analítico de datos">
  <!-- ponytail: CDN por ahora; antes de la feria se empaqueta local (offline-first) -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <script src="js/datos.js"></script>
  <script src="js/paneles.js"></script>
  <script src="js/terminal-codigo.js"></script>
</head>
<body>
  <a-scene fog="type: exponential; color: #08131f; density: 0.045">
    <a-assets>
      <img id="cielo" src="assets/skybox.png">
      <img id="grid" src="assets/piso-grid.png">
    </a-assets>

    <!-- Skybox 360 equirectangular (reemplazable por Blockade Labs, mismo archivo) -->
    <a-sky src="#cielo" material="fog: false"></a-sky>

    <!-- Piso: grid que se pierde en la niebla hacia el horizonte -->
    <a-plane rotation="-90 0 0" width="80" height="80" position="0 0 0"
             material="src: #grid; repeat: 40 40; shader: flat"></a-plane>

    <!-- Título flotante -->
    <a-text value="CENTRO ANALITICO" position="0 3.4 -4" align="center"
            color="#4dd8ff" width="8"></a-text>

    <!-- SALA DE CONTROL: 4 paneles en arco (radio 3.2 m) mirando al visitante -->
    <a-plane panel-echarts="tipo: prediccion" width="2.2" height="1.24"
             position="-2.59 1.7 -1.88" rotation="0 54 0"
             material="shader: flat; side: double"></a-plane>

    <a-plane panel-echarts="tipo: ventas" width="2.2" height="1.24"
             position="-0.99 1.7 -3.04" rotation="0 18 0"
             material="shader: flat; side: double"></a-plane>

    <a-plane panel-echarts="tipo: kpi" width="2.2" height="1.24"
             position="0.99 1.7 -3.04" rotation="0 -18 0"
             material="shader: flat; side: double"></a-plane>

    <a-plane panel-echarts="tipo: calor" width="2.2" height="1.24"
             position="2.59 1.7 -1.88" rotation="0 -54 0"
             material="shader: flat; side: double"></a-plane>

    <!-- Núcleo decorativo: anillos girando al centro de la sala -->
    <a-entity position="0 2.5 -4.5">
      <a-torus radius="0.55" radius-tubular="0.006" color="#4dd8ff" opacity="0.6"
               animation="property: rotation; to: 360 360 0; loop: true; dur: 14000; easing: linear"></a-torus>
      <a-torus radius="0.4" radius-tubular="0.006" color="#7dffb0" opacity="0.5"
               animation="property: rotation; to: -360 0 360; loop: true; dur: 10000; easing: linear"></a-torus>
      <a-sphere radius="0.12" color="#4dd8ff" opacity="0.9"
                animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dir: alternate; loop: true; dur: 1500"></a-sphere>
    </a-entity>

    <!-- ZONA DE DESARROLLO: detrás del visitante, gírate y ve el código en vivo -->
    <a-entity position="0 0 4.6" rotation="0 180 0">
      <a-text value="DESARROLLO EN VIVO" position="0 3.3 0" align="center"
              color="#7dffb0" width="6"></a-text>
      <!-- marco del monitor -->
      <a-plane width="3.4" height="2.2" position="0 1.9 0.02" color="#0e1e30"
               material="shader: flat"></a-plane>
      <a-plane terminal-codigo width="3.2" height="2.0" position="0 1.9 0"
               material="shader: flat; side: double"></a-plane>
      <!-- base tipo tótem -->
      <a-box width="0.5" height="0.8" depth="0.18" position="0 0.4 0.05"
             color="#0e1e30"></a-box>
    </a-entity>

    <!-- Cámara: en escritorio WASD + mouse; en Quest funciona igual sin cambios -->
    <a-entity camera look-controls wasd-controls position="0 1.6 0">
      <a-cursor color="#4dd8ff"></a-cursor>
    </a-entity>
  </a-scene>
</body>
</html>
